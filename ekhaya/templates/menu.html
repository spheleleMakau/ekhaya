<style>
.zoom-modal {
    display: none;
    position: fixed;
    z-index: 9999;
    left: 0; top: 0; width: 100vw; height: 100vh;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}
.zoom-modal.active {
    display: flex;
}
.zoom-modal img {
    max-width: 90vw;
    max-height: 90vh;
    border-radius: 18px;
    box-shadow: 0 4px 32px #000a;
    background: #fff;
}
.zoom-modal-close {
    position: absolute;
    top: 30px;
    right: 40px;
    color: #fff;
    font-size: 2.5rem;
    cursor: pointer;
    z-index: 10001;
    font-weight: bold;
    text-shadow: 0 2px 8px #000a;
}
</style>

<div id="zoomModal" class="zoom-modal" onclick="closeZoomModal(event)">
    <span class="zoom-modal-close" onclick="closeZoomModal(event)">&times;</span>
    <img id="zoomedMenuImg" src="" alt="Zoomed menu">
</div>

<script>
function slide(sliderId, direction) {
        const slider = document.getElementById(sliderId);
        const track = slider.querySelector('.slide-track');
        const imgWidth = slider.querySelector('.slide-img').offsetWidth + 24; // 24px gap
        slider.scrollLeft = slider.scrollLeft + direction * imgWidth;
}

function zoomMenu(img) {
        var modal = document.getElementById('zoomModal');
        var zoomedImg = document.getElementById('zoomedMenuImg');
        zoomedImg.src = img.src;
        zoomedImg.alt = img.alt;
        modal.classList.add('active');
}
function closeZoomModal(e) {
        if (e.target.classList.contains('zoom-modal') || e.target.classList.contains('zoom-modal-close')) {
                document.getElementById('zoomModal').classList.remove('active');
        }
}
</script>
